version: '3.8'

services:
  # Redis service for Celery broker/backend
  redis:
    image: redis:7-alpine
    container_name: autoform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # PostgreSQL database
  postgres:
    image: postgres:15
    container_name: autoform-postgres
    environment:
      POSTGRES_DB: autoform
      POSTGRES_USER: autoform
      POSTGRES_PASSWORD: autoform123
    ports:
      - "5432:5432"
    volumes:
      - autoform-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # FastAPI backend application
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoform-backend
    environment:
      # Database
      DATABASE_URL: postgresql://autoform:autoform123@postgres:5432/autoform
      
      # Redis
      REDIS_URL: redis://redis:6379/0
      
      # AWS Configuration
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      
      # Application
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key-here-change-in-production}
      
      # GitHub OAuth (for authentication)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      
      # Optional
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running Prisma migrations...' &&
        prisma migrate deploy &&
        echo 'Generating Prisma client...' &&
        prisma generate &&
        echo 'Starting FastAPI server...' &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Celery worker for deployments
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoform-celery-worker
    environment:
      # Same environment variables as backend
      DATABASE_URL: postgresql://autoform:autoform123@postgres:5432/autoform
      REDIS_URL: redis://redis:6379/0
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key-here-change-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock  # For Docker operations if needed
    command: >
      sh -c "
        echo 'Waiting for services...' &&
        sleep 10 &&
        echo 'Generating Prisma client...' &&
        prisma generate &&
        echo 'Starting Celery worker...' &&
        celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 -Q deployments,celery --without-gossip --without-mingle --without-heartbeat
      "

  # Celery beat for scheduled tasks (optional)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoform-celery-beat
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autoform
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key-here-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
    command: >
      sh -c "
        echo 'Waiting for services...' &&
        sleep 10 &&
        echo 'Generating Prisma client...' &&
        prisma generate &&
        echo 'Starting Celery beat...' &&
        celery -A app.workers.celery_app beat --loglevel=info
      "

  # Flower for monitoring Celery tasks (optional)
  # Uncomment after adding 'flower' to requirements.lock
  # flower:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: autoform-flower
  #   environment:
  #     CELERY_BROKER_URL: redis://redis:6379/0
  #     CELERY_RESULT_BACKEND: redis://redis:6379/0
  #   ports:
  #     - "5555:5555"
  #   depends_on:
  #     - redis
  #   command: celery -A app.workers.celery_app flower --port=5555

volumes:
  autoform-pg-data:
  redis-data: