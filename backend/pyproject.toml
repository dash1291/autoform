project = { dependencies = [
    "fastapi==0.104.1",
    "uvicorn[standard]==0.24.0",
    "python-dotenv==1.0.0",
    "pydantic==2.5.0",
    "pydantic-settings==2.1.0",
    "prisma==0.11.0",
    "asyncpg==0.29.0",
    "python-jose[cryptography]==3.3.0",
    "python-multipart==0.0.6",
    "httpx==0.25.2",
    "authlib==1.3.0",
    "boto3==1.34.4",
    "aioboto3==12.3.0",
    "pygithub==2.1.1",
    "celery==5.3.4",
    "redis==5.0.1",
    "fastapi-cors==0.0.6",
    "email-validator>=2.2.0",
] }
[tool.rye]
managed = true
virtual = true
dev-dependencies = [
    "pytest==7.4.3",
    "pytest-asyncio==0.21.1",
    "pytest-mock==3.12.0",
    "black==23.12.0",
    "flake8==6.1.0",
    "mypy==1.7.1",
]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
